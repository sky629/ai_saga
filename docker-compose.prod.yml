services:
  app:
    image: ${APP_IMAGE:-ai-saga:ec2}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-saga-app
    restart: unless-stopped
    ports:
      - "80:8000"
    environment:
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      FRONTEND_LOGIN_SUCCESS_URL: ${FRONTEND_LOGIN_SUCCESS_URL}
      GAME_MAX_TURNS: ${GAME_MAX_TURNS:-30}
      GAME_MIN_TURNS: ${GAME_MIN_TURNS:-1}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      IMAGE_GENERATION_ENABLED: ${IMAGE_GENERATION_ENABLED:-false}
      IMAGE_MODEL: ${IMAGE_MODEL:-imagen-3.0-generate-001}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_REFRESH_TOKEN_EXPIRE_MINUTES: ${JWT_REFRESH_TOKEN_EXPIRE_MINUTES:-1440}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_SESSION_EXPIRE_MINUTES: ${JWT_SESSION_EXPIRE_MINUTES:-1440}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      KANG_ENV: ${KANG_ENV:-prod}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-ai-saga}
      R2_ENDPOINT_URL: ${R2_ENDPOINT_URL:-}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      REDIS_AUTH_DB: ${REDIS_AUTH_DB:-1}
      REDIS_URL: ${REDIS_URL}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENABLED: ${SENTRY_ENABLED:-true}
      SENTRY_ENABLED_ENVIRONMENTS: ${SENTRY_ENABLED_ENVIRONMENTS:-prod}
      SENTRY_PROFILE_LIFECYCLE: ${SENTRY_PROFILE_LIFECYCLE:-trace}
      SENTRY_PROFILE_SESSION_SAMPLE_RATE: ${SENTRY_PROFILE_SESSION_SAMPLE_RATE:-0.0}
      SENTRY_SEND_DEFAULT_PII: ${SENTRY_SEND_DEFAULT_PII:-false}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.0}
      TEST_POSTGRES_DB: ${TEST_POSTGRES_DB}
      TEST_POSTGRES_HOST: ${TEST_POSTGRES_HOST}
      TEST_POSTGRES_PASSWORD: ${TEST_POSTGRES_PASSWORD}
      TEST_POSTGRES_PORT: ${TEST_POSTGRES_PORT:-5432}
      TEST_POSTGRES_USER: ${TEST_POSTGRES_USER}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/ping/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - ai-saga-network

  postgres:
    image: pgvector/pgvector:pg15
    container_name: ai-saga-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-saga-network

  redis:
    image: redis:7-alpine
    container_name: ai-saga-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ai-saga-network

volumes:
  postgres_data:
  redis_data:

networks:
  ai-saga-network:
    driver: bridge
